<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PriceWriter Offline</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<header>
  <div class="wrap">
    <div class="row" style="justify-content:space-between;">
      <div>
        <div style="font-weight:800; font-size:16px;">PriceWriter Offline</div>
        <div class="small">Offline searchable catalogue (private).</div>
      </div>
      <div class="row">
        <button class="btn" id="btnManage">Import / Replace</button>
        <button class="btn" id="btnHelp">Help</button>
      </div>
    </div>
    <div style="height:10px;"></div>

    <div class="row">
      <div>
        <label>Supplier (sorted by SupplierName)</label><br/>
        <select id="supplierSel" style="min-width:260px;">
          <option value="">Select supplier…</option>
        </select>
      </div>

      <div>
        <label>Range (shows Range — Renamed)</label><br/>
        <select id="rangeSel" style="min-width:320px;">
          <option value="">All ranges…</option>
        </select>
      </div>

      <div style="flex:1; min-width:240px;">
        <label>Search</label><br/>
        <input id="searchBox" type="search" placeholder="Search ItemID, ModelNum, Description, SKU…" />
      </div>

      <div>
        <label>&nbsp;</label><br/>
        <button class="btn" id="btnClear">Clear</button>
      </div>
    </div>

    <div style="height:10px;"></div>
    <div class="notice" id="statusBox">Loading…</div>
  </div>
</header>

<main>
  <div class="card">
    <h2>Results</h2>
    <div class="tableWrap">
      <table id="resultsTable">
        <thead><tr id="theadRow"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="list" id="resultsList"></div>
    <div class="footer" id="resultsFooter"></div>
  </div>
</main>

<!-- Detail overlay (opens when you tap a row) -->
<div id="detailOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:50;">
  <div style="background:#fff; max-width:980px; margin: 24px auto; border-radius:14px; overflow:hidden; border:1px solid #e5e5e5;">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #e5e5e5;">
      <div style="font-weight:700;">Item detail</div>
      <button class="btn" id="btnCloseDetail">Close</button>
    </div>
    <div class="detail" id="detailPane">
      <div class="small">Select an item to view all fields.</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
